<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PJ Placement & Sales Hub - Coming Soon</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #ffffff;
}

.container {
    background: #ffffff;
    border: 1px solid #eee;
    padding: 40px;
    border-radius: 20px;
    width: 90%;
    max-width: 500px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    animation: fadeIn 1.5s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

img {
    width: 140px;
    margin-bottom: 15px;
}

h1 {
    font-size: 26px;
    margin-bottom: 10px;
    color: #111;
}

p {
    font-size: 14px;
    margin-bottom: 20px;
    color: #555;
}

.countdown {
    display: flex;
    justify-content: space-between;
    margin: 25px 0;
}

.time-box {
    flex: 1;
    margin: 5px;
    background: #f7f7f7;
    padding: 12px;
    border-radius: 12px;
    transition: 0.3s;
}

.time-box:hover {
    transform: translateY(-5px);
    background: #f0f0f0;
}

.time-box span {
    font-size: 22px;
    font-weight: bold;
    display: block;
    color: #00a8b5;
}

form {
    margin-top: 15px;
}

input {
    width: 65%;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 6px;
    outline: none;
}

button {
    padding: 10px 15px;
    border: none;
    background: #00a8b5;
    color: white;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #007c86;
}

.footer {
    margin-top: 15px;
    font-size: 12px;
    color: #888;
}
</style>

</head>
<body>

<div class="container">

    <!-- Logo -->
    <img src="logo.jpg" alt="PJ Logo">

    <h1>PJ Placement & Sales Hub</h1>
    <p>Practical Marketing & Sales Training Institute</p>

    <p>🚀 We're launching something amazing soon!</p>

    <!-- Countdown -->
    <div class="countdown">
        <div class="time-box"><span id="days">00</span>Days</div>
        <div class="time-box"><span id="hours">00</span>Hours</div>
        <div class="time-box"><span id="minutes">00</span>Min</div>
        <div class="time-box"><span id="seconds">00</span>Sec</div>
    </div>

    <!-- Email Form -->
    <form onsubmit="subscribe(event)">
        <input type="email" id="email" placeholder="Enter your email" required>
        <button type="submit">Notify Me</button>
    </form>

    <div class="footer">
        📍 Jhunjhunu | Real Skills • Certification • Career Growth
    </div>

</div>

<script>
// Launch Date
const launchDate = new Date("2026-06-01 00:00:00").getTime();

const timer = setInterval(() => {
    const now = new Date().getTime();
    const distance = launchDate - now;

    document.getElementById("days").innerText = Math.floor(distance / (1000 * 60 * 60 * 24));
    document.getElementById("hours").innerText = Math.floor((distance / (1000 * 60 * 60)) % 24);
    document.getElementById("minutes").innerText = Math.floor((distance / (1000 * 60)) % 60);
    document.getElementById("seconds").innerText = Math.floor((distance / 1000) % 60);

    if (distance < 0) {
        clearInterval(timer);
        document.querySelector(".countdown").innerHTML = "🚀 We Are Live!";
    }
}, 1000);

// Subscribe
function subscribe(e) {
    e.preventDefault();
    const email = document.getElementById("email").value;
    alert("Thank you! We'll notify you at " + email);
    document.getElementById("email").value = "";
}
</script>

</body>
</html>
